<style>
    @page {
        size: A4 landscape;
        margin: 1.5cm 1cm 1.5cm 1cm;
        @frame footer {
            -pdf-frame-content: footer_content;
            bottom: 0.5cm; height: 0.8cm;
        }
    }
    @page portrait {
        size: A4 portrait;
        margin: 2cm 1.5cm 2cm 1.5cm;
        @frame footer {
            -pdf-frame-content: footer_content;
            bottom: 0.5cm; height: 0.8cm;
        }
    }
    body { font-family: Helvetica, Arial, sans-serif; font-size: 8pt; color: #222; }
    .portrait { -pdf-page-size: portrait; }

    /* Header */
    .pdf-header { margin-bottom: 10pt; border-bottom: 2pt solid #1A3A5C; padding-bottom: 5pt; }
    .pdf-header h1 { font-size: 13pt; color: #1A3A5C; margin: 0 0 2pt 0; }
    .pdf-header .subtitle { font-size: 8pt; color: #555; }
    .pdf-header .meta { font-size: 7.5pt; color: #555; float: right; text-align: right; }

    /* Section title */
    .section-title {
        background: #1A3A5C; color: #fff;
        font-size: 9pt; font-weight: bold;
        padding: 3pt 6pt; margin: 8pt 0 4pt 0;
    }
    .section-sub {
        background: #D6EAF8; color: #1A3A5C;
        font-size: 8.5pt; font-weight: bold;
        padding: 2pt 6pt; margin: 6pt 0 3pt 0;
    }

    /* Tables */
    table { width: 100%; border-collapse: collapse; margin-bottom: 6pt; }
    th {
        background: #1A3A5C; color: #fff;
        font-size: 7pt; font-weight: bold;
        padding: 3pt 4pt; text-align: left;
        border: 0.5pt solid #0d2340;
    }
    td {
        font-size: 7pt; padding: 2.5pt 4pt;
        border: 0.5pt solid #ccc;
        vertical-align: top;
    }
    tr.even td { background: #F0F4F8; }
    tr.total td { background: #1A3A5C; color: #fff; font-weight: bold; }
    td.ok { color: #155724; }
    td.nok { color: #721c24; }
    td.warn { color: #856404; }

    /* Summary boxes */
    .summary-box {
        border: 1pt solid #ccc; padding: 5pt 8pt; margin: 4pt 0;
        background: #F8F9FA;
    }
    .summary-box .label { font-size: 7pt; color: #555; }
    .summary-box .value { font-size: 13pt; font-weight: bold; color: #1A3A5C; }

    /* Badges */
    .badge-conforme { color: #155724; font-weight: bold; }
    .badge-nao_conforme { color: #721c24; font-weight: bold; }
    .badge-ressalvas { color: #856404; font-weight: bold; }
    .badge-indeterminado { color: #555; }
    .badge-pendente { color: #555; }

    /* Footer */
    #footer_content { font-size: 6.5pt; color: #888; text-align: center; border-top: 0.5pt solid #ccc; padding-top: 2pt; }
</style>

<div id="footer_content">
    Auditoria RPPS — Barra Mansa · Documento gerado em {{ data_geracao }} · Página <pdf:pagenumber> de <pdf:pagecount>
</div>
